name: Worker VagaMatch

on:
  schedule:
    - cron: "0 */2 * * *" # a cada 2 horas
  workflow_dispatch: {} # permite rodar manualmente pelo GitHub

# Reforço GitHub-side do lock app_state: nunca duas instâncias simultâneas,
# mesmo com workflow_dispatch manual colidindo com o cron.
concurrency:
  group: worker
  cancel-in-progress: false

jobs:
  rodar-worker:
    runs-on: ubuntu-latest
    # Menor que LOCK_TIMEOUT_MIN (15min) — job pendurado morre antes do
    # takeover do lock, evitando dois workers vivos ao mesmo tempo.
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      # npm bundlado no runner (Node 22 -> npm ~10.9) interpreta este
      # lockfile (lockfileVersion 3, optionalDeps aninhadas de esbuild via
      # vite@7 dentro do vitest@4.1) de forma diferente do npm usado pra
      # gerá-lo (11.x) — resultado varia entre EBADPLATFORM e "Missing from
      # lock file" dependendo da versão. Fixar a versão elimina a divergência.
      - run: npm install -g npm@11

      # --omit=dev: worker só usa "dependencies" (node worker/index.js puro,
      # sem build/test) — não precisa de vite/vitest nem do esbuild que
      # eles arrastam.
      - run: npm ci --omit=dev

      - run: npm run worker
        env:
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ADMIN_TELEGRAM_CHAT_ID: ${{ secrets.ADMIN_TELEGRAM_CHAT_ID }}
