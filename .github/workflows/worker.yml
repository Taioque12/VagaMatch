name: Worker VagaMatch

on:
  schedule:
    - cron: "*/10 * * * *" # a cada 10 min
  workflow_dispatch: {} # permite rodar manualmente pelo GitHub

# Reforço GitHub-side do lock app_state: nunca duas instâncias simultâneas,
# mesmo com workflow_dispatch manual colidindo com o cron.
concurrency:
  group: worker
  cancel-in-progress: false

jobs:
  rodar-worker:
    runs-on: ubuntu-latest
    # Menor que LOCK_TIMEOUT_MIN (15min) — job pendurado morre antes do
    # takeover do lock, evitando dois workers vivos ao mesmo tempo.
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: npm ci

      - run: npm run worker
        env:
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ADMIN_TELEGRAM_CHAT_ID: ${{ secrets.ADMIN_TELEGRAM_CHAT_ID }}
